name: CI

on:
  pull_request:
    branches:
      - "**"

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Check isort
        run: uv run isort --check-only src/ examples/

      - name: Check black
        run: uv run black --check src/ examples/

      - name: Check ruff
        run: uv run ruff check src/ examples/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/
